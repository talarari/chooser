name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Real Chromium↔Chromium WebRTC over a local Nostr relay — the guard that
      # goes red if a networking change breaks peer connectivity (issue #1).
      - run: npm run e2e:install
      - run: npm run e2e

  # WebKit (Safari's engine) over the same hermetic harness — the closest
  # stand-in for iPhone Safari on Linux/CI (issue #2). It currently FAILS:
  # WebKit gathers only mDNS .local host candidates that don't resolve over
  # loopback, so no peer connection forms — the same class of failure real
  # Safari hits without a TURN fallback. Kept non-blocking (continue-on-error,
  # and absent from deploy's `needs`) so it surfaces the Safari status without
  # gating deploys, and flips green on its own once the TURN fix lands.
  e2e-webkit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run e2e:install
      - run: npm run e2e:webkit

  deploy:
    needs: [test, e2e]
    # Validate on PRs, but only publish on pushes to main (or manual dispatch).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node build.mjs
      - name: Publish dist to gh-pages branch
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
