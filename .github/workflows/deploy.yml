name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    # The public Worker URL (CORS-locked, no secret) gives the connect suites a
    # real TURN relay. With it set, Chromium keeps mDNS obfuscation on — which
    # reproduces the iPhone condition (only unresolvable .local host candidates,
    # issue #2) — and the run proves the TURN relay rescues the connection. It
    # also de-flakes CI: GitHub runners resolve loopback mDNS unreliably, so
    # without a relay these peers intermittently fail to pair.
    env:
      TURN_WORKER_URL: https://chooser-turn.talarari.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Real Chromium↔Chromium WebRTC over a local Nostr relay — the guard that
      # goes red if a networking change breaks peer connectivity (issue #1).
      - run: npm run e2e:install
      - run: npm run e2e

  # Safari signals — non-blocking (continue-on-error, absent from deploy's
  # `needs`) so they surface iPhone Safari status (issue #2) without gating
  # deploys. WebKit-on-Linux is not real Safari, and TURN depends on an external
  # service, so these stay best-effort; real confirmation needs a device.
  #   * e2e:webkit — WebKit (Safari's engine) over loopback, with mDNS host
  #     candidates + the TURN relay fallback (TURN_WORKER_URL below).
  #   * e2e:turn — forces ICE through the Cloudflare TURN relay (iceTransportPolicy
  #     'relay') and asserts two peers connect purely over it; skips only if no
  #     Worker URL is set.
  # The Worker URL is public (CORS-locked, no secret), so it lives here in plain
  # text — no GitHub secret needed.
  e2e-safari:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      TURN_WORKER_URL: https://chooser-turn.talarari.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run e2e:install
      - run: npm run e2e:webkit
      - run: npm run e2e:turn

  deploy:
    needs: [test, e2e]
    # Validate on PRs, but only publish on pushes to main (or manual dispatch).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node build.mjs
      - name: Publish dist to gh-pages branch
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
