name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      # Real Chromium↔Chromium WebRTC over a local Nostr relay — the guard that
      # goes red if a networking change breaks peer connectivity (issue #1).
      - run: npm run e2e:install
      - run: npm run e2e

  # Safari + relay signals. Both exercise the REAL production relay path: they
  # mint short-lived credentials from the Cloudflare Worker (turn-worker/) and
  # relay through Cloudflare TURN, so they need outbound egress to Cloudflare
  # TURN. Non-blocking (continue-on-error, absent from deploy's `needs`) so a
  # transient TURN/egress hiccup can't wedge a deploy, but they are expected to
  # pass — not skip (issue #2):
  #   * e2e:webkit — WebKit (Safari's engine), the closest stand-in for iPhone
  #     Safari on Linux/CI. WebKit gathers only mDNS .local host candidates it
  #     can't resolve for the peer, so it connects only over a TURN relay
  #     candidate — the exact relay fallback real iPhone Safari needs.
  #   * e2e:turn — forces ICE through Cloudflare TURN (iceTransportPolicy:relay)
  #     and asserts two peers connect over the relay, so a direct path can't mask
  #     a broken relay.
  # WebKit-on-Linux is not real Safari; final confirmation needs a device/cloud lab.
  e2e-safari:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run e2e:install
      - run: npm run e2e:webkit
      - run: npm run e2e:turn

  deploy:
    needs: [test, e2e]
    # Validate on PRs, but only publish on pushes to main (or manual dispatch).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node build.mjs
      - name: Publish dist to gh-pages branch
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
